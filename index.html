<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>我的文件分享站</title>
    <style>
        body { font-family: sans-serif; margin: 40px; }
        .container { max-width: 600px; margin: auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        .status { margin-top: 20px; padding: 10px; border-radius: 4px; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        button { cursor: pointer; padding: 8px 16px; margin-top: 10px; }
        #fileList { margin-top: 20px; list-style: none; padding: 0; }
        #fileList li { margin-bottom: 10px; padding: 10px; background: #f8f9fa; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📁 文件上传</h1>
        <input type="file" id="fileInput" />
        <button id="uploadBtn">上传</button>
        <div id="status" class="status"></div>

        <h2>📋 已上传的文件</h2>
        <ul id="fileList">
            <li>加载中...</li>
        </ul>
    </div>

    <script>
        // ---------------- 在这里填写你的配置 ----------------
        const WORKER_URL = 'https://qiniu-token-provider.stanleyyehc.workers.dev';
        // -------------------------------------------------

        const uploadBtn = document.getElementById('uploadBtn');
        const fileInput = document.getElementById('fileInput');
        const statusDiv = document.getElementById('status');
        const fileListUl = document.getElementById('fileList');

        // 显示状态消息
        function showMessage(text, isError = false) {
            statusDiv.textContent = text;
            statusDiv.className = `status ${isError ? 'error' : 'success'}`;
            setTimeout(() => {
                if (statusDiv.textContent === text) {
                    statusDiv.textContent = '';
                    statusDiv.className = 'status';
                }
            }, 5000);
        }

        // 获取上传凭证
        async function getUploadToken() {
            try {
                const response = await fetch(`${WORKER_URL}/get-upload-token`);
                if (!response.ok) throw new Error('网络错误');
                const data = await response.json();
                return data.uploadToken;
            } catch (error) {
                console.error('获取凭证失败:', error);
                showMessage('获取上传凭证失败，请重试', true);
                return null;
            }
        }

        // 加载并显示所有文件列表
        async function loadFileList() {
            fileListUl.innerHTML = '<li>加载中...</li>';
            try {
                const response = await fetch(`${WORKER_URL}/list-files`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const files = await response.json();
                if (files.length === 0) {
                    fileListUl.innerHTML = '<li>暂无文件，快上传一个吧～</li>';
                    return;
                }
                // 生成文件列表
                fileListUl.innerHTML = files.map(file => `
                    <li>
                        <a href="${WORKER_URL}/${encodeURIComponent(file.key)}" target="_blank">
                            ${escapeHtml(file.key)}
                        </a> 
                        (${formatFileSize(file.size)})
                    </li>
                `).join('');
            } catch (error) {
                console.error('加载文件列表失败:', error);
                fileListUl.innerHTML = '<li class="error">加载文件列表失败，请稍后重试</li>';
            }
        }

        // 辅助：格式化文件大小
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // 辅助：转义HTML防止XSS
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // 上传文件
        async function uploadFile() {
            const file = fileInput.files[0];
            if (!file) {
                showMessage('请先选择一个文件', true);
                return;
            }

            uploadBtn.disabled = true;
            showMessage('正在获取上传凭证...');

            const token = await getUploadToken();
            if (!token) {
                uploadBtn.disabled = false;
                return;
            }

            showMessage(`正在上传 ${file.name}...`);

            // 使用七牛云前端 SDK 上传
            const formData = new FormData();
            formData.append('token', token);
            formData.append('key', file.name);
            formData.append('file', file);

            try {
                const response = await fetch('https://upload.qiniup.com/', {
                    method: 'POST',
                    body: formData,
                });

                if (!response.ok) throw new Error(`上传失败: ${response.status}`);
                const result = await response.json();
                console.log('上传成功:', result);
                showMessage(`✅ 文件 ${file.name} 上传成功！`);
                fileInput.value = '';
                loadFileList();
            } catch (error) {
                console.error('上传出错:', error);
                showMessage(`❌ 上传失败: ${error.message}`, true);
            } finally {
                uploadBtn.disabled = false;
            }
        }

        uploadBtn.addEventListener('click', uploadFile);
        loadFileList();
    </script>
</body>
</html>
